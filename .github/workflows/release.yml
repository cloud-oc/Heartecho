name: Build and Publish Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Build package and sync GitHub Release
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version
        id: version
        run: |
          version="$(tr -d '[:space:]' < VERSION)"
          if [ -z "$version" ]; then
            echo "VERSION is empty" >&2
            exit 1
          fi
          echo "value=$version" >> "$GITHUB_OUTPUT"

      - name: Install icon build dependency
        run: |
          python3 -m venv .venv
          .venv/bin/python -m pip install --upgrade pip
          .venv/bin/python -m pip install Pillow

      - name: Build release artifacts
        env:
          VERSION: ${{ steps.version.outputs.value }}
          BUILD_NUMBER: ${{ github.run_number }}
          PYTHON: ${{ github.workspace }}/.venv/bin/python
        run: scripts/build-release-artifacts.sh --configuration release

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.value }}
        run: |
          scripts/publish-github-release.sh \
            --asset "build/pkg/Heartecho-Distribution-${VERSION}.pkg" \
            --asset "build/pkg/Heartecho-${VERSION}.pkg" \
            --asset "build/pkg/Heartecho-Uninstaller-${VERSION}.pkg" \
            --asset "build/release-manifest.json"
